<!DOCTYPE html>
<html>

</head>
<body>

    <button class="toggle-btn">☰</button>

    <!-- Sidebar dinámico -->
    <div id="sidebar-container"></div>

    <!-- Main -->
    <div class="main">
        <div class="cards">
            <div class="card">
                <h3>Ventas Totales</h3>
                <p id="ventas">$0</p>
            </div>
            <div class="card">

                <p id="clientes">0</p>
            </div>
            <div class="card">
                <h3>Productos</h3>
                <p id="productos">0</p>
            </div>
            <div class="card">
                <h3>Pedidos</h3>
                <p id="pedidos">0</p>
            </div>
        </div>
    </div>

    <script src="js/menu.js"></script>

</body>
</html>
